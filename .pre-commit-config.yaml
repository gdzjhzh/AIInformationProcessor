repos:
  - repo: local
    hooks:
      - id: signal-to-obsidian-contract-guard
        name: Signal to Obsidian contract guard
        entry: python deploy/n8n/scripts/precommit_guard.py --check contract
        language: system
        pass_filenames: true
        files: ^(contracts/|deploy/n8n/workflows/|deploy/n8n/scripts/(precommit_guard|validate_workflow_boundaries|validate_regression_matrix)\.py|deploy/README\.md|deploy/n8n/WORKFLOW_NOTES\.md)$
      - id: signal-to-obsidian-smoke-guard
        name: Signal to Obsidian qdrant smoke guard
        entry: python deploy/n8n/scripts/precommit_guard.py --check smoke
        language: system
        pass_filenames: true
        files: ^(deploy/n8n/workflows/|deploy/n8n/scripts/smoke_qdrant_gate\.py|deploy/compose\.yaml|deploy/\.env\.example)$
