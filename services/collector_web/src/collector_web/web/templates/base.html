<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Collector Web{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/app.css?v=20260425-compare">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <div>
                <p class="eyebrow">AI Information Processor</p>
                <h1 class="site-title">Collector Web</h1>
            </div>
            <nav class="site-nav">
                <a
                    href="/"
                    class="{% if request.url.path == '/' %}is-active{% endif %}"
                >
                    订阅概览
                </a>
                <a
                    href="/manual-media-submit"
                    class="{% if request.url.path == '/manual-media-submit' %}is-active{% endif %}"
                >
                    手动提交
                </a>
                <a
                    href="/calibration-compare"
                    class="{% if request.url.path == '/calibration-compare' %}is-active{% endif %}"
                >
                    校对对比
                </a>
                <a
                    href="/status"
                    class="{% if request.url.path == '/status' %}is-active{% endif %}"
                >
                    服务状态
                </a>
            </nav>
        </header>
        <main>
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
