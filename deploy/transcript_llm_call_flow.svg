<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1260" viewBox="0 0 1900 1260" role="img" aria-labelledby="title desc">
  <title id="title">Transcript-side LLM Call Flow</title>
  <desc id="desc">Current Signal to Obsidian transcript pipeline showing n8n polling, VideoTranscriptAPI cache and ASR, LLM calibration and summary calls, and calibrated raw persistence.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#596474"/>
    </marker>
    <style>
      .bg { fill: #f7f4ee; }
      .section { fill: #fcfbf8; stroke: #d7d0c4; stroke-width: 2; }
      .panel-title { font: 700 28px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #3c3127; }
      .title { font: 700 34px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #2d241b; }
      .subtitle { font: 400 18px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #6d6253; }
      .label { font: 700 20px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #2e3743; }
      .body { font: 400 16px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #445162; }
      .small { font: 400 14px 'Segoe UI', 'Microsoft YaHei', sans-serif; fill: #5e6978; }
      .mono { font: 400 14px Consolas, monospace; fill: #4a5568; }
      .box { fill: #ffffff; stroke: #97a2af; stroke-width: 2; }
      .box-llm { fill: #fff1d6; stroke: #d38a00; stroke-width: 2.5; }
      .box-store { fill: #ebf7ef; stroke: #4d9b6b; stroke-width: 2.5; }
      .optional { stroke-dasharray: 10 8; }
      .diamond { fill: #eef6ff; stroke: #6e92b8; stroke-width: 2.5; }
      .line { stroke: #596474; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #7b8796; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .legend { fill: #fffdf8; stroke: #ddd4c8; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1260"/>

  <text class="title" x="70" y="70">Current transcript-side LLM call flow</text>
  <text class="subtitle" x="70" y="104">What spends tokens vs. what is only ASR, cache, polling, and raw-note persistence.</text>

  <rect class="legend" x="1320" y="32" width="510" height="78" rx="14" ry="14"/>
  <rect class="box" x="1350" y="56" width="64" height="24" rx="8" ry="8"/>
  <text class="small" x="1430" y="73">non-LLM step</text>
  <rect class="box-llm" x="1540" y="56" width="64" height="24" rx="8" ry="8"/>
  <text class="small" x="1618" y="73">LLM call, spends tokens</text>
  <rect class="box-store" x="1350" y="84" width="64" height="24" rx="8" ry="8"/>
  <text class="small" x="1430" y="101">cache / persisted artifact</text>

  <rect class="section" x="40" y="140" width="360" height="1060" rx="24" ry="24"/>
  <text class="panel-title" x="70" y="184">n8n 04 Video Transcript Ingest</text>

  <rect class="section" x="430" y="140" width="450" height="1060" rx="24" ry="24"/>
  <text class="panel-title" x="460" y="184">VideoTranscriptAPI</text>

  <rect class="section" x="910" y="140" width="950" height="1060" rx="24" ry="24"/>
  <text class="panel-title" x="940" y="184">LLM worker and token-spending path</text>

  <!-- Left column -->
  <rect class="box" x="80" y="238" width="280" height="90" rx="18" ry="18"/>
  <text class="label" x="110" y="274">Input media URL</text>
  <text class="body" x="110" y="302">manual submit or upstream workflow input</text>

  <rect class="box" x="80" y="376" width="280" height="90" rx="18" ry="18"/>
  <text class="label" x="110" y="412">POST /api/transcribe</text>
  <text class="body" x="110" y="440">speaker flag and metadata override</text>

  <rect class="box" x="80" y="514" width="280" height="90" rx="18" ry="18"/>
  <text class="label" x="110" y="550">Receive task_id and view_token</text>
  <text class="body" x="110" y="578">start polling task status</text>

  <rect class="box" x="80" y="652" width="280" height="90" rx="18" ry="18"/>
  <text class="label" x="110" y="688">GET /api/task/{task_id}</text>
  <text class="body" x="110" y="716">202 means wait and poll again</text>

  <polygon class="diamond" points="220,790 310,850 220,910 130,850"/>
  <text class="label" x="192" y="844">code</text>
  <text class="label" x="180" y="874">= 202?</text>

  <rect class="box" x="80" y="956" width="280" height="116" rx="18" ry="18"/>
  <text class="label" x="110" y="992">Resolve Transcript Result</text>
  <text class="body" x="110" y="1020">prefer calibrated_transcript</text>
  <text class="body" x="110" y="1044">fallback to transcript</text>

  <rect class="box-store" x="80" y="1104" width="280" height="82" rx="18" ry="18"/>
  <text class="label" x="110" y="1140">Write vault raw</text>
  <text class="body" x="110" y="1168">raw_kind=calibrated becomes calibrated raw note</text>

  <!-- Middle column -->
  <rect class="box" x="500" y="238" width="310" height="90" rx="18" ry="18"/>
  <text class="label" x="530" y="274">Receive /api/transcribe</text>
  <text class="body" x="530" y="302">create task and inspect cache</text>

  <polygon class="diamond" points="655,376 780,456 655,536 530,456"/>
  <text class="label" x="596" y="442">cache has</text>
  <text class="mono" x="568" y="468">llm_calibrated + llm_summary ?</text>

  <rect class="box-store" x="500" y="586" width="310" height="102" rx="18" ry="18"/>
  <text class="label" x="530" y="622">full cache hit</text>
  <text class="body" x="530" y="650">later /api/task can return success</text>
  <text class="body" x="530" y="674">without re-running LLM</text>

  <rect class="box" x="500" y="726" width="310" height="124" rx="18" ry="18"/>
  <text class="label" x="530" y="762">Acquire transcript</text>
  <text class="body" x="530" y="790">platform subtitles or CapsWriter or FunASR</text>
  <text class="body" x="530" y="814">ASR only, no LLM token spend here</text>

  <rect class="box" x="500" y="890" width="310" height="90" rx="18" ry="18"/>
  <text class="label" x="530" y="926">Return processing first</text>
  <text class="body" x="530" y="954">n8n starts polling with task_id</text>

  <rect class="box" x="500" y="1020" width="310" height="80" rx="18" ry="18"/>
  <text class="label" x="530" y="1056">enqueue llm_task</text>
  <text class="body" x="530" y="1080">background worker continues</text>

  <rect class="box-store" x="500" y="1130" width="310" height="70" rx="18" ry="18"/>
  <text class="label" x="530" y="1166">after LLM, /api/task returns success</text>

  <!-- Right column -->
  <rect class="box" x="1030" y="238" width="300" height="80" rx="18" ry="18"/>
  <text class="label" x="1060" y="274">_handle_llm_task</text>
  <text class="body" x="1060" y="300">LLM queue worker</text>

  <rect class="box-llm optional" x="1400" y="218" width="320" height="100" rx="18" ry="18"/>
  <text class="label" x="1430" y="254">Optional call 0: title generation</text>
  <text class="body" x="1430" y="282">only when generic downloader has no title</text>
  <text class="mono" x="1430" y="306">use transcript head to create a short title</text>

  <rect class="box" x="1030" y="356" width="300" height="92" rx="18" ry="18"/>
  <text class="label" x="1060" y="392">LLMCoordinator.process(...)</text>
  <text class="body" x="1060" y="420">route calibration first, summary second</text>

  <rect class="box-llm" x="1030" y="498" width="300" height="132" rx="18" ry="18"/>
  <text class="label" x="1060" y="534">Call 1: calibration</text>
  <text class="mono" x="1060" y="562">model = calibrate_model = deepseek-chat</text>
  <text class="body" x="1060" y="590">input: transcript or dialogs</text>
  <text class="body" x="1060" y="614">output: calibrated_text</text>

  <polygon class="diamond" points="1180,678 1330,768 1180,858 1030,768"/>
  <text class="label" x="1110" y="742">Skip summary?</text>
  <text class="body" x="1090" y="770">calibrate_only = true</text>
  <text class="body" x="1062" y="794">or calibrated text length &lt; 500</text>

  <rect class="box" x="1030" y="898" width="300" height="100" rx="18" ry="18"/>
  <text class="label" x="1060" y="934">No summary LLM call</text>
  <text class="body" x="1060" y="962">this branch spends only calibration tokens</text>
  <text class="body" x="1060" y="986">common in recalibrate or short text flows</text>

  <rect class="box-llm" x="1400" y="898" width="320" height="122" rx="18" ry="18"/>
  <text class="label" x="1430" y="934">Call 2: summary</text>
  <text class="mono" x="1430" y="962">model = summary_model = deepseek-chat</text>
  <text class="body" x="1430" y="990">generate summary from calibrated text</text>
  <text class="body" x="1430" y="1014">this is the second token spend</text>

  <rect class="box-store" x="1030" y="1058" width="690" height="122" rx="18" ry="18"/>
  <text class="label" x="1060" y="1094">Persist cache and task result</text>
  <text class="mono" x="1060" y="1122">cache files: llm_calibrated.txt and llm_summary.txt (when summary exists)</text>
  <text class="mono" x="1060" y="1146">task data: calibrated_transcript, summary_text, body_text_source=calibrated</text>
  <text class="body" x="1060" y="1170">n8n then uses calibrated text as raw_text and vault raw becomes the calibrated version</text>

  <!-- Arrows left -->
  <path class="line" d="M 220 328 L 220 376"/>
  <path class="line" d="M 220 466 L 220 514"/>
  <path class="line" d="M 220 604 L 220 652"/>
  <path class="line" d="M 220 742 L 220 790"/>
  <path class="line" d="M 220 910 L 220 956"/>
  <path class="line" d="M 220 1072 L 220 1104"/>

  <!-- Cross arrows left to middle -->
  <path class="line" d="M 360 421 L 500 421 L 500 283"/>
  <path class="line-soft" d="M 360 697 L 470 697 L 470 925 L 500 925"/>

  <!-- Middle arrows -->
  <path class="line" d="M 655 328 L 655 376"/>
  <path class="line" d="M 655 536 L 655 586"/>
  <path class="line" d="M 655 688 L 655 726"/>
  <path class="line" d="M 655 850 L 655 890"/>
  <path class="line" d="M 655 980 L 655 1020"/>
  <path class="line" d="M 655 1100 L 655 1130"/>
  <path class="line-soft" d="M 780 456 L 860 456 L 860 637 L 810 637"/>

  <!-- Poll loop -->
  <path class="line-soft" d="M 130 850 L 60 850 L 60 697 L 80 697"/>

  <!-- Right arrows -->
  <path class="line" d="M 810 1060 L 1030 1060 L 1030 278"/>
  <path class="line-soft" d="M 1330 278 L 1400 278"/>
  <path class="line" d="M 1180 318 L 1180 356"/>
  <path class="line" d="M 1180 448 L 1180 498"/>
  <path class="line" d="M 1180 630 L 1180 678"/>
  <path class="line-soft" d="M 1100 828 L 1100 898"/>
  <path class="line-soft" d="M 1330 768 L 1560 768 L 1560 898"/>
  <path class="line" d="M 1180 998 L 1180 1058"/>
  <path class="line" d="M 1560 1020 L 1560 1058"/>

  <!-- Back from worker to API and n8n -->
  <path class="line" d="M 1030 1158 L 860 1158 L 860 1164 L 810 1164"/>
  <path class="line-soft" d="M 500 1164 L 390 1164 L 390 1014 L 360 1014"/>

  <text class="small" x="70" y="1240">Typical path = 2 real LLM calls (calibration + summary). Short-text or recalibrate path = 1 real LLM call.</text>
</svg>
