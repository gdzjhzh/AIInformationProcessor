<svg xmlns="http://www.w3.org/2000/svg" width="1900" height="1260" viewBox="0 0 1900 1260" role="img" aria-labelledby="title desc">
  <title id="title">Transcript 链路大模型调用逻辑</title>
  <desc id="desc">展示当前 AIInformationProcessor 在 transcript 场景下，从 n8n 提交任务、VideoTranscriptAPI 转录与查缓存，到 LLM 校对、LLM 总结，以及校对稿写入 raw 的完整业务流。</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#596474"/>
    </marker>
    <style>
      .bg { fill: #f7f4ee; }
      .section { fill: #fcfbf8; stroke: #d7d0c4; stroke-width: 2; }
      .panel-title { font: 700 28px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #3c3127; }
      .title { font: 700 34px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #2d241b; }
      .subtitle { font: 400 18px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #6d6253; }
      .label { font: 700 20px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #2e3743; }
      .body { font: 400 16px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #445162; }
      .small { font: 400 14px 'Microsoft YaHei', 'Segoe UI', sans-serif; fill: #5e6978; }
      .mono { font: 400 14px Consolas, 'Microsoft YaHei', monospace; fill: #4a5568; }
      .box { fill: #ffffff; stroke: #97a2af; stroke-width: 2; }
      .box-llm { fill: #fff1d6; stroke: #d38a00; stroke-width: 2.5; }
      .box-store { fill: #ebf7ef; stroke: #4d9b6b; stroke-width: 2.5; }
      .optional { stroke-dasharray: 10 8; }
      .diamond { fill: #eef6ff; stroke: #6e92b8; stroke-width: 2.5; }
      .line { stroke: #596474; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .line-soft { stroke: #7b8796; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .legend { fill: #fffdf8; stroke: #ddd4c8; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1900" height="1260"/>

  <text class="title" x="70" y="70">当前 transcript 链路的大模型调用逻辑</text>
  <text class="subtitle" x="70" y="104">重点看清三件事：哪里是普通处理，哪里真的消耗 LLM token，哪里把校对成果落进 raw。</text>

  <rect class="legend" x="1260" y="32" width="570" height="78" rx="14" ry="14"/>
  <rect class="box" x="1290" y="56" width="64" height="24" rx="8" ry="8"/>
  <text class="small" x="1370" y="73">普通流程，不消耗大模型 token</text>
  <rect class="box-llm" x="1550" y="56" width="64" height="24" rx="8" ry="8"/>
  <text class="small" x="1628" y="73">真正调用大模型，会消耗 token</text>
  <rect class="box-store" x="1290" y="84" width="64" height="24" rx="8" ry="8"/>
  <text class="small" x="1370" y="101">缓存或最终落盘产物</text>

  <rect class="section" x="40" y="140" width="360" height="1060" rx="24" ry="24"/>
  <text class="panel-title" x="70" y="184">n8n：04 Video Transcript Ingest</text>

  <rect class="section" x="430" y="140" width="450" height="1060" rx="24" ry="24"/>
  <text class="panel-title" x="460" y="184">VideoTranscriptAPI：服务主流程</text>

  <rect class="section" x="910" y="140" width="950" height="1060" rx="24" ry="24"/>
  <text class="panel-title" x="940" y="184">LLM Worker：真正花 token 的地方</text>

  <!-- Left column -->
  <rect class="box" x="80" y="238" width="280" height="90" rx="18" ry="18"/>
  <text class="label" x="110" y="274">输入媒体链接</text>
  <text class="body" x="110" y="302">人工提交，或其他 workflow 传入</text>

  <rect class="box" x="80" y="376" width="280" height="90" rx="18" ry="18"/>
  <text class="label" x="110" y="412">提交转录任务</text>
  <text class="body" x="110" y="440">POST /api/transcribe，附带参数</text>

  <rect class="box" x="80" y="514" width="280" height="90" rx="18" ry="18"/>
  <text class="label" x="110" y="550">拿到 task_id 和 view_token</text>
  <text class="body" x="110" y="578">开始轮询任务状态</text>

  <rect class="box" x="80" y="652" width="280" height="90" rx="18" ry="18"/>
  <text class="label" x="110" y="688">查询任务状态</text>
  <text class="body" x="110" y="716">GET /api/task/{task_id}</text>

  <polygon class="diamond" points="220,790 310,850 220,910 130,850"/>
  <text class="label" x="190" y="842">还是</text>
  <text class="label" x="176" y="872">202 吗</text>

  <rect class="box" x="80" y="956" width="280" height="116" rx="18" ry="18"/>
  <text class="label" x="110" y="992">整理返回正文</text>
  <text class="body" x="110" y="1020">优先拿 calibrated_transcript</text>
  <text class="body" x="110" y="1044">没有才退回 transcript</text>

  <rect class="box-store" x="80" y="1104" width="280" height="82" rx="18" ry="18"/>
  <text class="label" x="110" y="1140">写入 vault raw</text>
  <text class="body" x="110" y="1168">raw_kind=calibrated 时，raw 就是校对稿</text>

  <!-- Middle column -->
  <rect class="box" x="500" y="238" width="310" height="90" rx="18" ry="18"/>
  <text class="label" x="530" y="274">接收转录请求</text>
  <text class="body" x="530" y="302">创建任务，并先检查缓存</text>

  <polygon class="diamond" points="655,376 780,456 655,536 530,456"/>
  <text class="label" x="574" y="442">缓存里已经有</text>
  <text class="mono" x="548" y="468">llm_calibrated + llm_summary ?</text>

  <rect class="box-store" x="500" y="586" width="310" height="102" rx="18" ry="18"/>
  <text class="label" x="530" y="622">完整缓存命中</text>
  <text class="body" x="530" y="650">后续 /api/task 可直接返回 success</text>
  <text class="body" x="530" y="674">不用重新跑大模型</text>

  <rect class="box" x="500" y="726" width="310" height="124" rx="18" ry="18"/>
  <text class="label" x="530" y="762">先做转录</text>
  <text class="body" x="530" y="790">平台字幕 / CapsWriter / FunASR</text>
  <text class="body" x="530" y="814">这里只是 ASR，不消耗 LLM token</text>

  <rect class="box" x="500" y="890" width="310" height="90" rx="18" ry="18"/>
  <text class="label" x="530" y="926">先返回 processing</text>
  <text class="body" x="530" y="954">让 n8n 继续轮询，不提前写 raw</text>

  <rect class="box" x="500" y="1020" width="310" height="80" rx="18" ry="18"/>
  <text class="label" x="530" y="1056">把 llm_task 放进队列</text>
  <text class="body" x="530" y="1080">后台 worker 异步继续做 LLM</text>

  <rect class="box-store" x="500" y="1130" width="310" height="70" rx="18" ry="18"/>
  <text class="label" x="530" y="1166">LLM 完成后，/api/task 才 success</text>

  <!-- Right column -->
  <rect class="box" x="1030" y="238" width="300" height="80" rx="18" ry="18"/>
  <text class="label" x="1060" y="274">LLM Worker 开始处理</text>
  <text class="body" x="1060" y="300">_handle_llm_task</text>

  <rect class="box-llm optional" x="1400" y="218" width="320" height="100" rx="18" ry="18"/>
  <text class="label" x="1430" y="254">可选：补标题</text>
  <text class="body" x="1430" y="282">只有标题缺失时才额外调一次模型</text>
  <text class="mono" x="1430" y="306">从 transcript 开头生成一个短标题</text>

  <rect class="box" x="1030" y="356" width="300" height="92" rx="18" ry="18"/>
  <text class="label" x="1060" y="392">进入协调器</text>
  <text class="body" x="1060" y="420">先校对，再判断是否要总结</text>

  <rect class="box-llm" x="1030" y="498" width="300" height="132" rx="18" ry="18"/>
  <text class="label" x="1060" y="534">第 1 次大模型调用：校对</text>
  <text class="mono" x="1060" y="562">model = calibrate_model = deepseek-chat</text>
  <text class="body" x="1060" y="590">输入 transcript 或 dialogs</text>
  <text class="body" x="1060" y="614">输出 calibrated_text</text>

  <polygon class="diamond" points="1180,678 1330,768 1180,858 1030,768"/>
  <text class="label" x="1098" y="742">要不要跳过总结</text>
  <text class="body" x="1096" y="770">calibrate_only = true</text>
  <text class="body" x="1056" y="794">或校对后文本长度小于 500</text>

  <rect class="box" x="1030" y="898" width="300" height="100" rx="18" ry="18"/>
  <text class="label" x="1060" y="934">不再发起总结调用</text>
  <text class="body" x="1060" y="962">这条分支只花“校对”这一轮 token</text>
  <text class="body" x="1060" y="986">常见于短文本或重校对</text>

  <rect class="box-llm" x="1400" y="898" width="320" height="122" rx="18" ry="18"/>
  <text class="label" x="1430" y="934">第 2 次大模型调用：总结</text>
  <text class="mono" x="1430" y="962">model = summary_model = deepseek-chat</text>
  <text class="body" x="1430" y="990">基于校对稿生成摘要</text>
  <text class="body" x="1430" y="1014">这是第二轮 token 消耗</text>

  <rect class="box-store" x="1030" y="1058" width="690" height="122" rx="18" ry="18"/>
  <text class="label" x="1060" y="1094">保存缓存和任务结果</text>
  <text class="mono" x="1060" y="1122">cache: llm_calibrated.txt / llm_summary.txt</text>
  <text class="mono" x="1060" y="1146">task data: calibrated_transcript, summary_text, body_text_source=calibrated</text>
  <text class="body" x="1060" y="1170">n8n 轮询到 success 后，就把校对稿当 raw_text 写进 vault</text>

  <!-- Arrows left -->
  <path class="line" d="M 220 328 L 220 376"/>
  <path class="line" d="M 220 466 L 220 514"/>
  <path class="line" d="M 220 604 L 220 652"/>
  <path class="line" d="M 220 742 L 220 790"/>
  <path class="line" d="M 220 910 L 220 956"/>
  <path class="line" d="M 220 1072 L 220 1104"/>

  <!-- Cross arrows left to middle -->
  <path class="line" d="M 360 421 L 500 421 L 500 283"/>
  <path class="line-soft" d="M 360 697 L 470 697 L 470 925 L 500 925"/>

  <!-- Middle arrows -->
  <path class="line" d="M 655 328 L 655 376"/>
  <path class="line" d="M 655 536 L 655 586"/>
  <path class="line" d="M 655 688 L 655 726"/>
  <path class="line" d="M 655 850 L 655 890"/>
  <path class="line" d="M 655 980 L 655 1020"/>
  <path class="line" d="M 655 1100 L 655 1130"/>
  <path class="line-soft" d="M 780 456 L 860 456 L 860 637 L 810 637"/>

  <!-- Poll loop -->
  <path class="line-soft" d="M 130 850 L 60 850 L 60 697 L 80 697"/>

  <!-- Right arrows -->
  <path class="line" d="M 810 1060 L 1030 1060 L 1030 278"/>
  <path class="line-soft" d="M 1330 278 L 1400 278"/>
  <path class="line" d="M 1180 318 L 1180 356"/>
  <path class="line" d="M 1180 448 L 1180 498"/>
  <path class="line" d="M 1180 630 L 1180 678"/>
  <path class="line-soft" d="M 1100 828 L 1100 898"/>
  <path class="line-soft" d="M 1330 768 L 1560 768 L 1560 898"/>
  <path class="line" d="M 1180 998 L 1180 1058"/>
  <path class="line" d="M 1560 1020 L 1560 1058"/>

  <!-- Back from worker to API and n8n -->
  <path class="line" d="M 1030 1158 L 860 1158 L 860 1164 L 810 1164"/>
  <path class="line-soft" d="M 500 1164 L 390 1164 L 390 1014 L 360 1014"/>

  <text class="small" x="70" y="1240">正常情况会发生两次真正的 LLM 调用：先校对，再总结。短文本或重校对场景通常只会发生一次。</text>
</svg>
