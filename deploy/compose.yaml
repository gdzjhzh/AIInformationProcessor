name: signal-to-obsidian

services:
  memos:
    image: neosmemo/memos:stable
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MEMOS_PORT:-5230}:5230"
    volumes:
      - ./data/memos:/var/opt/memos
    environment:
      TZ: ${TZ:-America/New_York}

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${N8N_PORT:-5678}:5678"
    volumes:
      - ./data/n8n:/home/node/.n8n
      - ./data/n8n/storage:/home/node/.n8n-files
      - "${OBSIDIAN_VAULT_PATH:-./vault}:/vault"
      - "${AI_WIKI_RAW_EXPORT_PATH:-C:/Users/hewqb/Documents/Obsidian Vault/AI_Wiki/raw}:/ai_wiki_raw"
    environment:
      TZ: ${TZ:-America/New_York}
      GENERIC_TIMEZONE: ${TZ:-America/New_York}
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: "false"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "false"
      NODE_FUNCTION_ALLOW_BUILTIN: "fs,path"
      N8N_RESTRICT_FILE_ACCESS_TO: "/vault;/home/node/.n8n-files;/ai_wiki_raw"
      N8N_RUNNERS_TASK_REQUEST_TIMEOUT: ${N8N_RUNNERS_TASK_REQUEST_TIMEOUT:-1800}
      N8N_RUNNERS_TASK_TIMEOUT: ${N8N_RUNNERS_TASK_TIMEOUT:-1800}
      OBSIDIAN_VAULT_PATH: /vault
      OBSIDIAN_INBOX_DIR: ${OBSIDIAN_INBOX_DIR}
      OBSIDIAN_DAILY_DIR: ${OBSIDIAN_DAILY_DIR}
      RSS_SOURCE_URLS_JSON: ${RSS_SOURCE_URLS_JSON}
      LLM_BASE_URL: ${LLM_BASE_URL}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_MODEL: ${LLM_MODEL}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      EMBEDDING_INPUT_MAX_CHARS: ${EMBEDDING_INPUT_MAX_CHARS:-6000}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION}
      QDRANT_VECTOR_SIZE: ${QDRANT_VECTOR_SIZE}
      QDRANT_DIFF_THRESHOLD: ${QDRANT_DIFF_THRESHOLD}
      QDRANT_SILENT_THRESHOLD: ${QDRANT_SILENT_THRESHOLD}
      VIDEO_TRANSCRIPT_BASE_URL: ${VIDEO_TRANSCRIPT_BASE_URL}
      VIDEO_TRANSCRIPT_API_KEY: ${VIDEO_TRANSCRIPT_API_KEY}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL}
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:${QDRANT_PORT:-6333}:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    environment:
      TZ: ${TZ:-America/New_York}

  redis:
    image: redis:alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    volumes:
      - ./data/redis:/data

  browserless:
    profiles:
      - headless
    image: browserless/chrome:latest
    restart: unless-stopped
    shm_size: 1gb
    environment:
      TZ: ${TZ:-America/New_York}
      TIMEOUT: "120000"
      CONNECTION_TIMEOUT: "120000"
      MAX_CONCURRENT_SESSIONS: "5"
      MAX_QUEUE_LENGTH: "10"

  funasr-spk-server:
    profiles:
      - transcript
    build:
      context: ../services/funasr_spk_server
      dockerfile: Dockerfile
    image: ${FUNASR_SPK_IMAGE:-signal-to-obsidian-funasr-spk-server:local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FUNASR_SPK_PORT:-8767}:8767"
    volumes:
      - ../services/funasr_spk_server/config.json:/app/config.json:ro
      - ./data/funasr-spk-server/models:/app/models
      - ./data/funasr-spk-server/uploads:/app/uploads
      - ./data/funasr-spk-server/logs:/app/logs
      - ./data/funasr-spk-server/data:/app/data
      - ./data/funasr-spk-server/temp:/app/temp
    environment:
      TZ: ${TZ:-America/New_York}
      PYTHONUNBUFFERED: "1"
      PYTHONPATH: /app
      FUNASR_SERVER_HOST: 0.0.0.0
      FUNASR_SERVER_PORT: 8767
      FUNASR_WEBHOOK_URL: ${FUNASR_WEBHOOK_URL:-}
      FUNASR_AUTH_SECRET_KEY: ${FUNASR_AUTH_SECRET_KEY:-local-dev-secret-key}
      FUNASR_AUTH_ENABLED: ${FUNASR_AUTH_ENABLED:-false}
      FUNASR_NOTIFICATION_ENABLED: ${FUNASR_NOTIFICATION_ENABLED:-false}
      FUNASR_LOG_LEVEL: ${FUNASR_LOG_LEVEL:-INFO}
      FUNASR_MODEL_DIR: /app/models
      FUNASR_UPLOAD_DIR: /app/uploads
      FUNASR_TEMP_DIR: /app/temp
      FUNASR_LOG_DIR: /app/logs
      FUNASR_DATA_DIR: /app/data
      FUNASR_DEVICE: ${FUNASR_DEVICE:-cpu}
      FUNASR_DEVICE_PRIORITY: ${FUNASR_DEVICE_PRIORITY:-cpu}
      FUNASR_NCPU: ${FUNASR_NCPU:-8}
      FUNASR_BATCH_SIZE_S: ${FUNASR_BATCH_SIZE_S:-60}
      FUNASR_MAX_CONCURRENT_TASKS: ${FUNASR_MAX_CONCURRENT_TASKS:-1}
      FUNASR_TASK_TIMEOUT_MINUTES: ${FUNASR_TASK_TIMEOUT_MINUTES:-60}
      FUNASR_TRANSCRIPTION_SPEED_RATIO: ${FUNASR_TRANSCRIPTION_SPEED_RATIO:-4}
      OMP_NUM_THREADS: ${FUNASR_OMP_NUM_THREADS:-4}
      PYTORCH_MPS_HIGH_WATERMARK_RATIO: ${PYTORCH_MPS_HIGH_WATERMARK_RATIO:-0.0}
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.create_connection(('127.0.0.1', 8767), 5); s.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  video-transcript-api:
    profiles:
      - transcript
    build:
      context: ../services/VideoTranscriptAPI
      dockerfile: docker/Dockerfile
    image: ${VIDEO_TRANSCRIPT_IMAGE:-signal-to-obsidian-video-transcript-api:local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${VIDEO_TRANSCRIPT_HOST_PORT:-18080}:8000"
    volumes:
      - ../services/VideoTranscriptAPI/config:/app/config
      - ./data/video-transcript-api:/app/data
    environment:
      TZ: ${TZ:-America/New_York}
      MODEL_COMPARE_OUTPUT_DIR: /app/data/model_compare
      MODEL_COMPARE_MODEL_KEYS: ${MODEL_COMPARE_MODEL_KEYS:-deepseek,doubao}
      MODEL_COMPARE_DEEPSEEK_API_KEY: ${MODEL_COMPARE_DEEPSEEK_API_KEY:-}
      MODEL_COMPARE_DEEPSEEK_BASE_URL: ${MODEL_COMPARE_DEEPSEEK_BASE_URL:-}
      MODEL_COMPARE_DEEPSEEK_MODEL: ${MODEL_COMPARE_DEEPSEEK_MODEL:-}
      MODEL_COMPARE_DEEPSEEK_REASONING_EFFORT: ${MODEL_COMPARE_DEEPSEEK_REASONING_EFFORT:-}
      MODEL_COMPARE_DEEPSEEK_THINKING_TYPE: ${MODEL_COMPARE_DEEPSEEK_THINKING_TYPE:-}
      MODEL_COMPARE_DOUBAO_API_KEY: ${MODEL_COMPARE_DOUBAO_API_KEY:-}
      MODEL_COMPARE_DOUBAO_BASE_URL: ${MODEL_COMPARE_DOUBAO_BASE_URL:-}
      MODEL_COMPARE_DOUBAO_MODEL: ${MODEL_COMPARE_DOUBAO_MODEL:-}
      MODEL_COMPARE_DOUBAO_REASONING_EFFORT: ${MODEL_COMPARE_DOUBAO_REASONING_EFFORT:-}
      MODEL_COMPARE_DOUBAO_THINKING_TYPE: ${MODEL_COMPARE_DOUBAO_THINKING_TYPE:-}
    depends_on:
      - funasr-spk-server

  collector-web:
    build:
      context: ../services/collector_web
      dockerfile: docker/Dockerfile
    image: ${COLLECTOR_WEB_IMAGE:-signal-to-obsidian-collector-web:local}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${COLLECTOR_WEB_PORT:-8300}:8300"
    volumes:
      - ./data/collector_web:/data
      - ./data/n8n/storage/poll_runs:/data/n8n_poll_runs:ro
      - ../services/collector_web/src:/app/src:ro
      - ../services/collector_web/main.py:/app/main.py:ro
    environment:
      TZ: ${TZ:-America/New_York}
      COLLECTOR_WEB_HOST: 0.0.0.0
      COLLECTOR_WEB_PORT: 8300
      COLLECTOR_WEB_DB_PATH: /data/collector_web.sqlite
      COLLECTOR_WEB_POLL_RUNS_DIR: /data/n8n_poll_runs
      COLLECTOR_WEB_RSS_POLL_RERUN_URL: ${COLLECTOR_WEB_RSS_POLL_RERUN_URL:-http://n8n:5678/webhook/2f6d0f2b1e9a4c51/rss-poll-rerun-webhook/signal-to-obsidian/local/rss-poll-rerun}
      COLLECTOR_WEB_RSS_POLL_RERUN_TIMEOUT_SECONDS: ${COLLECTOR_WEB_RSS_POLL_RERUN_TIMEOUT_SECONDS:-30}
      COLLECTOR_WEB_MANUAL_MEDIA_SUBMIT_URL: ${COLLECTOR_WEB_MANUAL_MEDIA_SUBMIT_URL:-http://n8n:5678/webhook/6b8eaf7c41d2439a/manual-media-submit-webhook/signal-to-obsidian/local/manual-media-submit}
      COLLECTOR_WEB_MANUAL_MEDIA_SUBMIT_TIMEOUT_SECONDS: ${COLLECTOR_WEB_MANUAL_MEDIA_SUBMIT_TIMEOUT_SECONDS:-1800}
      COLLECTOR_WEB_MANUAL_MEDIA_SUBMIT_DISPATCH_TIMEOUT_SECONDS: ${COLLECTOR_WEB_MANUAL_MEDIA_SUBMIT_DISPATCH_TIMEOUT_SECONDS:-30}
      COLLECTOR_WEB_CALLBACK_BASE_URL: ${COLLECTOR_WEB_CALLBACK_BASE_URL:-http://collector-web:8300}
      COLLECTOR_WEB_MANUAL_MEDIA_PRECHECK_TIMEOUT_SECONDS: ${COLLECTOR_WEB_MANUAL_MEDIA_PRECHECK_TIMEOUT_SECONDS:-10}
      COLLECTOR_WEB_QDRANT_BASE_URL: ${COLLECTOR_WEB_QDRANT_BASE_URL:-http://qdrant:6333}
      COLLECTOR_WEB_QDRANT_COLLECTION: ${QDRANT_COLLECTION:-article_embeddings}
      COLLECTOR_WEB_QDRANT_TIMEOUT_SECONDS: ${COLLECTOR_WEB_QDRANT_TIMEOUT_SECONDS:-30}
      COLLECTOR_WEB_MANUAL_SUBMISSION_HISTORY_LIMIT: ${COLLECTOR_WEB_MANUAL_SUBMISSION_HISTORY_LIMIT:-12}
      COLLECTOR_WEB_CALIBRATION_COMPARE_API_BASE_URL: ${COLLECTOR_WEB_CALIBRATION_COMPARE_API_BASE_URL:-http://video-transcript-api:8000/api/model-compare}
      COLLECTOR_WEB_CALIBRATION_COMPARE_API_KEY: ${VIDEO_TRANSCRIPT_API_KEY:-}
      COLLECTOR_WEB_CALIBRATION_COMPARE_PUBLIC_BASE_URL: ${COLLECTOR_WEB_CALIBRATION_COMPARE_PUBLIC_BASE_URL:-http://127.0.0.1:${VIDEO_TRANSCRIPT_HOST_PORT:-18080}}
      COLLECTOR_WEB_CALIBRATION_COMPARE_TIMEOUT_SECONDS: ${COLLECTOR_WEB_CALIBRATION_COMPARE_TIMEOUT_SECONDS:-30}
      RSS_SOURCE_URLS_JSON: ${RSS_SOURCE_URLS_JSON:-[]}

  rsshub:
    image: ${RSSHUB_IMAGE:-diygod/rsshub:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${RSSHUB_PORT:-1200}:1200"
    environment:
      NODE_ENV: production
      TZ: ${TZ:-America/New_York}
      CACHE_TYPE: redis
      REDIS_URL: redis://redis:6379/
      PUPPETEER_WS_ENDPOINT: ${RSSHUB_PUPPETEER_WS_ENDPOINT:-}
    depends_on:
      - redis

  im2memo:
    profiles:
      - feishu
    image: ${IM2MEMO_IMAGE:-ghcr.io/zj1123581321/im2memo:latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${IM2MEMO_PORT:-3000}:3000"
    environment:
      TZ: ${TZ:-America/New_York}
      MEMOS_URL: http://memos:5230
      MEMOS_TOKEN: ${IM2MEMO_MEMOS_TOKEN}
      FEISHU_APP_ID: ${FEISHU_APP_ID}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET}
    depends_on:
      - memos
